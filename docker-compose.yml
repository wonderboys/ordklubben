services:
  db:
    image: postgres:16-alpine
    container_name: ordklubben-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ordklubben
    volumes:
      - ordklubben_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ordklubben"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  ordklubben_pgdata:
